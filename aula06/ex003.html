<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript</title>
    <style>
        body{
            background-color: rgb(105, 105, 173);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Ola,mundo!</h1>
    <p>Primeiro codigo em javascript</p>

    <script>
       var n1 = Number(window.prompt('Digite um numero:')) //String
       var n2 =  Number(window.prompt('Digite outro numero')) //String
       var s = n1 + n2
       window.alert(`A soma entre ${n1} e ${n2} e igual a : ${s}`)
       //(number + number) e uma adição
       //(string + string) e uma concatenação
       
    </script>
</body>
</html>
