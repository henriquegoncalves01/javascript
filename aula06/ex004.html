<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 10pt Arial;
        }
    </style>
</head>
<body>
    
    <script>
        var nome = window.prompt("Qual e seu nome?")
        document.writeln(`Ola <strong>${nome}</strong>, seu nome tem ${nome.length} letras <br> `)
        document.writeln(`Seu nome em maisculos e <strong>${nome.toUpperCase()}</strong><br>`)
        document.write(`Seu nome em letras minusculas e <strong>${nome.toLowerCase()}</strong><br>`)
    </script>
</body>
</html>
